
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dosreb Website</title>
    <style>
        /* Reset */
        body, h1, h2, p, ul {
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            color: #333;
            line-height: 1.6;
        }

        /* Header */
        header {
            background: #4CAF50;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        nav ul li {
            margin: 10px;
        }

        nav ul li a {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
        }

        /* Main content */
        main {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }

        section {
            margin-bottom: 20px;
        }

        /* Customer Service Section */
        #customer-service {
            background: #f1f1f1;
            padding: 20px;
            text-align: center;
        }

        .agent-card {
            display: inline-block;
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 300px;
        }

        .agent-photo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 10px;
        }

        #chat-btn {
            background-color: #4CAF50;
            color: #fff;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 10px;
        }

        #chat-btn:hover {
            background-color: #45a049;
        }

        /* Chat Box */
        #chat-box {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 300px;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            padding: 10px;
        }

        .hidden {
            display: none;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .chat-body {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 10px;
            font-size: 0.9rem;
            max-height: 200px;
        }

        #chat-input {
            width: 100%;
            padding: 8px;
            margin-bottom: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        #send-msg {
            background-color: #4CAF50;
            color: #fff;
            border: none;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            nav ul {
                flex-direction: column;
                align-items: center;
            }

            .agent-card {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Dosreb</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="customer-service">
            <h2>Customer Service</h2>
            <div class="agent-card">
                <img src="https://via.placeholder.com/100" alt="Agent" class="agent-photo">
                <p>Need help? Chat with us!</p>
                <button id="chat-btn">Chat Now</button>
            </div>
        </section>
    </main>

    <!-- Chat Box -->
    <div id="chat-box" class="hidden">
        <div class="chat-header">
            <span>Chat Support</span>
            <button onclick="document.getElementById('chat-box').classList.add('hidden')">X</button>
        </div>
        <div class="chat-body"></div>
        <input type="text" id="chat-input" placeholder="Type your message...">
        <button id="send-msg">Send</button>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const chatBtn = document.getElementById("chat-btn");
            const chatBox = document.getElementById("chat-box");
            const sendBtn = document.getElementById("send-msg");
            const chatInput = document.getElementById("chat-input");
            const chatBody = document.querySelector(".chat-body");

            // Toggle chat box visibility
            chatBtn.addEventListener("click", () => {
                chatBox.classList.toggle("hidden");
            });

            // Send message
            sendBtn.addEventListener("click", () => {
                const message = chatInput.value.trim();
                if (message) {
                    const userMsg = document.createElement("div");
                    userMsg.textContent = "You: " + message;
                    chatBody.appendChild(userMsg);
                    chatInput.value = "";

                    // Simulate bot response
                    setTimeout(() => {
                        const botMsg = document.createElement("div");
                        botMsg.textContent = "Bot: Thanks for your message!";
                        chatBody.appendChild(botMsg);
                        chatBody.scrollTop = chatBody.scrollHeight;
                    }, 1000);
                }
            });
        });
    </script>
</body>
</html>
